<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Global Mood Map — real-time emotional weather for the planet." />
    <meta name="theme-color" content="#0b1020" />
    <link rel="preconnect" href="https://basemaps.cartocdn.com" crossorigin />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- The OG placeholders (title/url/image) below are rewritten with
         absolute URLs by the server when it serves this file (see
         server/app.ts); crawlers need absolute og: URLs. In vite dev they
         stay as-is (harmless). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Global Mood Map" />
    <meta property="og:title" content="__OG_TITLE__" />
    <meta property="og:description" content="Real-time emotional weather for the planet — anonymous, privacy-first, live." />
    <meta property="og:url" content="__OG_URL__" />
    <meta property="og:image" content="__OG_IMAGE__" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>Global Mood Map</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌍</text></svg>" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
